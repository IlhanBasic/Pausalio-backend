<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podsetnici za danas</title>
</head>
<body style="margin:0;padding:0;background:#f0f4ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f0f4ff;padding:40px 16px;">
        <tr>
            <td align="center">
                <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(102,126,234,0.12);">
                    <tr>
                        <td style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:36px 40px;text-align:center;">
                            <div style="font-size:40px;margin-bottom:12px;">📌</div>
                            <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;letter-spacing:-0.3px;">Podsetnici za danas</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:40px 40px 32px;text-align:center;">
                            <h2 style="margin:0 0 16px;color:#1e293b;font-size:20px;font-weight:700;">Zdravo!</h2>
                            <p style="margin:0 0 24px;color:#4a5568;font-size:16px;line-height:1.7;">
                                Imate sledeće podsetnike za danas <b>{{Date}}</b>:
                            </p>
                            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:32px;text-align:left;">
                                <tr>
                                    <td style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:20px 24px;">
                                        {{ReminderItems}}
                                    </td>
                                </tr>
                            </table>
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center">
                                        <a href="{{DashboardUrl}}"
                                           style="display:inline-block;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#ffffff;text-decoration:none;font-size:16px;font-weight:600;padding:16px 48px;border-radius:50px;box-shadow:0 8px 24px rgba(102,126,234,0.35);letter-spacing:0.3px;">
                                            Otvori Dashboard
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:24px 40px;text-align:center;">
                            <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.6;">
                                Pausalio © vaš poslovni asistent
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
