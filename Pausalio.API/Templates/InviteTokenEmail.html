<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>{{PageTitle}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        .email-container {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .email-container {
                padding: 32px 24px;
                border-radius: 16px;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .message {
            font-size: 16px;
            color: #4a5568;
            margin: 24px 0;
            text-align: center;
            font-weight: 400;
            line-height: 1.7;
        }

        .token-box {
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border: 2px solid #e2e8f0;
            padding: 24px 20px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
            color: #2d3748;
            border-radius: 12px;
            letter-spacing: 4px;
            word-break: break-word;
            margin: 32px 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

            .token-box:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
                border-color: #cbd5e0;
            }

        .button-container {
            text-align: center;
            margin: 32px 0 16px;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            padding: 16px 48px;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            letter-spacing: 0.5px;
            cursor: pointer;
        }

            .button:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
                background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            }

            .button:active {
                transform: translateY(-1px);
                box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            }

            .button:focus-visible {
                outline: 3px solid #a78bfa;
                outline-offset: 4px;
            }

        .footer {
            font-size: 14px;
            color: #718096;
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            font-weight: 400;
            line-height: 1.6;
        }

        .fallback-text {
            font-size: 14px;
            color: #4a5568;
            margin-top: 24px;
            background: #f7fafc;
            padding: 16px 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        /* Osigurava da linkovi unutar dugmeta budu beli */
        a.button {
            color: #ffffff !important;
        }

            a.button:hover {
                color: #ffffff !important;
                text-decoration: none;
            }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="header">
            <div class="title">{{Title}}</div>
        </div>

        <div class="message">{{Message}}</div>

        <div class="token-box">{{Token}}</div>

        <div class="button-container">
            <a href="{{RegisterLink}}" class="button">{{ButtonText}}</a>
        </div>

        <div class="footer">
            {{Footer}}
        </div>
    </div>
</body>
</html>
