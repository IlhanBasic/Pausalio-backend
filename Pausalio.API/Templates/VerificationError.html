<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes" />
    <title>{{PageTitle}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: radial-gradient(circle at 10% 30%, #fce7f3 0%, #ffe4e6 40%, #fff1f2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            background-color: #ffffff;
            padding: 44px 36px;
            border-radius: 32px;
            box-shadow: 0 25px 45px -10px rgba(190, 30, 45, 0.18), 0 8px 20px rgba(0,0,0,0.02);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.25s ease;
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 32px 20px;
                border-radius: 28px;
            }
        }

        .error-icon {
            width: 88px;
            height: 88px;
            background: linear-gradient(145deg, #d1454b, #b3343a);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 12px 22px -8px rgba(180, 50, 50, 0.35);
            animation: softAppear 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

            .error-icon svg {
                width: 54px;
                height: 54px;
                fill: white;
                opacity: 0.95;
                transform: scale(0.9);
                animation: iconPulse 2s infinite ease-in-out;
            }

        @keyframes softAppear {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(10px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(0.9);
                opacity: 0.9;
            }

            50% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            color: #1e293b;
            margin-bottom: 12px;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
            word-break: break-word;
        }

        p {
            color: #475569;
            line-height: 1.6;
            margin-bottom: 28px;
            font-size: 17px;
            font-weight: 400;
            padding: 0 8px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 8px 0 12px;
        }

        .button {
            display: inline-block;
            padding: 14px 32px;
            background: #2563eb;
            color: white !important;
            text-decoration: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
            border: none;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.2);
            letter-spacing: 0.3px;
            flex: 0 1 auto;
            min-width: 160px;
        }

            .button:hover {
                background: #1d4ed8;
                transform: translateY(-3px);
                box-shadow: 0 14px 24px rgba(37, 99, 235, 0.3);
            }

            .button:active {
                transform: translateY(0);
                box-shadow: 0 7px 14px rgba(37, 99, 235, 0.25);
            }

        .button-secondary {
            background: #f1f5f9;
            color: #1e293b !important;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }

            .button-secondary:hover {
                background: #e2e8f0;
                color: #0f172a !important;
                border-color: #cbd5e1;
                box-shadow: 0 12px 22px rgba(0, 0, 0, 0.05);
                transform: translateY(-3px);
            }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #64748b;
            border-top: 1px solid #e9edf2;
            padding-top: 24px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .button:focus-visible {
            outline: 3px solid #bfdbfe;
            outline-offset: 3px;
        }

        .fallback-links {
            margin-top: 24px;
            font-size: 14px;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 18px;
            color: #334155;
            word-break: break-all;
        }

            .fallback-links a {
                color: #2563eb;
                text-decoration: underline;
                font-weight: 500;
            }

        @media (max-width: 450px) {
            .button-group {
                flex-direction: column;
                align-items: center;
            }

            .button {
                width: 100%;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">
            <svg viewBox="0 0 24 24" aria-label="Error icon" role="img">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 11c-.55 0-1-.45-1-1V8c0-.55.45-1 1-1s1 .45 1 1v4c0 .55-.45 1-1 1zm1 4h-2v-2h2v2z" />
            </svg>
        </div>

        <h1>{{Title}}</h1>
        <p>{{Message}}</p>

        <div class="button-group">
            <a href="{{ResendLink}}" class="button">{{ResendButtonText}}</a>
            <a href="{{HomeLink}}" class="button button-secondary">{{HomeButtonText}}</a>
        </div>


        <div class="footer">
            {{Footer}}
        </div>
    </div>
</body>
</html>
