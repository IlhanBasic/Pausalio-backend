<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PageTitle}}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .email-container {
            max-width: 560px;
            margin: 0 auto;
            background: #ffffff;
            padding: 48px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-text-fill-color: transparent;
        }

        .message {
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 32px;
        }

        .token-box {
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            background: #edf2f7;
            padding: 20px;
            border-radius: 12px;
            letter-spacing: 4px;
            margin-bottom: 32px;
        }

        .footer {
            font-size: 14px;
            color: #718096;
            margin-top: 32px;
        }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="title">{{Title}}</div>
        <div class="message">{{Message}}</div>
        <div class="token-box">{{Token}}</div>
        <div class="footer">{{Footer}}</div>
    </div>
</body>
</html>
