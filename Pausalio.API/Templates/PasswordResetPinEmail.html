<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PageTitle}}</title>
</head>
<body style="margin:0;padding:0;background:#f0f4ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

    <!-- Wrapper -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f0f4ff;padding:40px 16px;">
        <tr>
            <td align="center">

                <!-- Card -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(102,126,234,0.12);">

                    <!-- Header bar -->
                    <tr>
                        <td style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:32px 40px;text-align:center;">
                            <div style="display:inline-block;background:rgba(255,255,255,0.15);border-radius:50%;width:64px;height:64px;line-height:64px;text-align:center;font-size:28px;margin-bottom:12px;">🔐</div>
                            <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;letter-spacing:-0.3px;">{{Title}}</h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:40px 40px 24px;">
                            <p style="margin:0 0 28px;color:#4a5568;font-size:16px;line-height:1.7;text-align:center;">{{Message}}</p>

                            <!-- PIN box -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center" style="padding:0 0 28px;">
                                        <div style="display:inline-block;background:linear-gradient(135deg,#f7f8ff 0%,#eef0ff 100%);border:2px solid #c7d2fe;border-radius:16px;padding:24px 40px;text-align:center;">
                                            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#667eea;margin-bottom:10px;">Kod za reset</div>
                                            <div style="font-size:36px;font-weight:800;color:#2d3748;letter-spacing:8px;font-family:'SF Mono','Menlo','Consolas',monospace;">{{Token}}</div>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <!-- Warning box -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td style="background:#fff7ed;border-left:4px solid #f97316;border-radius:8px;padding:14px 18px;">
                                        <p style="margin:0;color:#9a3412;font-size:13px;line-height:1.6;">
                                            ⚠️ <strong>Ovaj kod važi 15 minuta.</strong> Ako niste tražili reset lozinke, možete ignorisati ovaj email.
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f8fafc;border-top:1px solid #e2e8f0;padding:24px 40px;text-align:center;">
                            <p style="margin:0;font-size:13px;color:#94a3b8;line-height:1.6;">{{Footer}}</p>
                        </td>
                    </tr>

                </table>
                <!-- /Card -->

            </td>
        </tr>
    </table>

</body>
</html>
